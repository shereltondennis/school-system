<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
    <title>Grades</title>
    <link rel="stylesheet" href="stylesheet/assets/styles.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <h2>BrightFuture</h2>
    <a href="darshboard.html">Dashboard</a>
    <a href="student.html">Students</a>
    <a href="teachers.html">Teachers</a>
    <a href="classes.html">Classes</a>
    <a href="subjects.html">Subjects</a>
    <a href="attendance.html">Attendance</a>
    <a href="grades.html" class="active">Grades</a>
    <a href="fees.html">Fees</a>
    <a href="calender.html">Calendar</a>
    <a href="settings.html">Settings</a>
    <a href="index.html">Logout</a>
  </aside>
  <main class="main">
    <div class="topbar"><h1>Grades</h1><button class="btn" type="button">Export Report</button></div>
    <div class="card" style="margin-bottom:16px;">
      <form class="form" style="grid-template-columns:1fr 1fr 1fr; gap:12px;">
        <div><label>Class</label><select class="input"><option>Grade 9B</option><option>Grade 7A</option></select></div>
        <div><label>Subject</label><select class="input"><option>Mathematics</option><option>English</option></select></div>
        <div><label>Term</label><select class="input"><option>Term 2 - 2026</option><option>Term 1 - 2026</option></select></div>
      </form>
    </div>
    <table>
      <thead><tr><th>Roll No</th><th>Student</th><th>Class</th><th>Subject</th><th>Teacher</th><th>Term</th><th>Test 1 /20</th><th>Test 2 /20</th><th>Exam /60</th><th>Total /100</th><th>Grade</th></tr></thead>
      <tbody id="adminGradesBody">
        <tr><td>S-1021</td><td>Amara Johnson</td><td>18</td><td>17</td><td>52</td><td>87</td><td><span class="badge ok">A</span></td></tr>
        <tr><td>S-1022</td><td>David Mensah</td><td>14</td><td>12</td><td>40</td><td>66</td><td><span class="badge">C</span></td></tr>
      </tbody>
    </table>
  </main>
</div>
<script>
  const adminGradesBody = document.getElementById("adminGradesBody");
  const recordedGrades = (() => {
    try {
      return JSON.parse(localStorage.getItem("teacherRecordedGrades")) || [];
    } catch {
      return [];
    }
  })();

  if (recordedGrades.length) {
    adminGradesBody.innerHTML = recordedGrades.map((item) =>
      `<tr><td>${item.studentId}</td><td>${item.studentName}</td><td>${item.className}</td><td>${item.subject}</td><td>${item.teacherName}</td><td>${item.term}</td><td>${item.testOne}</td><td>${item.testTwo}</td><td>${item.exam}</td><td>${item.total}</td><td><span class="badge ${item.grade === "A" ? "ok" : item.grade === "D" ? "warn" : ""}">${item.grade}</span></td></tr>`
    ).join("");
  } else {
    adminGradesBody.innerHTML = '<tr><td>S-1021</td><td>Amara Johnson</td><td>Grade 7A</td><td>Mathematics</td><td>Ms. Evelyn Cole</td><td>Term 2 - 2026</td><td>18</td><td>17</td><td>52</td><td>87</td><td><span class="badge ok">A</span></td></tr><tr><td>S-1022</td><td>David Mensah</td><td>Grade 9B</td><td>Physics</td><td>Ms. Evelyn Cole</td><td>Term 2 - 2026</td><td>14</td><td>12</td><td>40</td><td>66</td><td><span class="badge">C</span></td></tr>';
  }
</script>
<script src="stylesheet/assets/sidebar.js"></script>
<script src="stylesheet/assets/app.js"></script>
</body>
</html>
