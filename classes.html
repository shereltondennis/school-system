<div class="app">
  <aside class="sidebar">

  <main class="main">
    <div class="topbar"><h1>Classes</h1><a class="btn" href="#add">Add Class</a></div>
    <table>
      <thead><tr><th>Class</th><th>Grade Level</th><th>Class Teacher</th><th>Students</th><th>Room</th></tr></thead>
      <tbody>
        <tr><td>7A</td><td>Grade 7</td><td>Mr. Samuel Wright</td><td>34</td><td>Block A-12</td></tr>
        <tr><td>9B</td><td>Grade 9</td><td>Ms. Evelyn Cole</td><td>31</td><td>Block B-04</td></tr>
      </tbody>
    </table>
    <div class="card" id="add" style="margin-top:16px;">
      <h3 style="margin-bottom:12px;">Add New Class</h3>
      <form class="form" style="grid-template-columns:1fr 1fr 1fr; gap:12px;">
        <div><label>Class Name</label><input class="input" placeholder="8C"></div>
        <div><label>Grade Level</label><select class="input"><option>Grade 7</option><option>Grade 8</option><option>Grade 9</option></select></div>
        <div><label>Class Teacher</label><select class="input"><option>Ms. Evelyn Cole</option><option>Mr. Samuel Wright</option></select></div>
        <div><label>Room No.</label><input class="input"></div>
        <div style="grid-column:span 3;"><button class="btn" type="button">Save Class</button></div>
      </form>
    </div>
  </main>
</div>
