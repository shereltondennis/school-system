<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
    <title>Students</title>
    <link rel="stylesheet" href="stylesheet/assets/styles.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <h2>BrightFuture</h2>
    <a href="darshboard.html">Dashboard</a>
    <a href="student.html" class="active">Students</a>
    <a href="teachers.html">Teachers</a>
    <a href="classes.html">Classes</a>
    <a href="subjects.html">Subjects</a>
    <a href="attendance.html">Attendance</a>
    <a href="grades.html">Grades</a>
    <a href="fees.html">Fees</a>
    <a href="calender.html">Calendar</a>
    <a href="settings.html">Settings</a>
    <a href="index.html">Logout</a>
  </aside>
  <main class="main">
    <div class="topbar"><h1>Students</h1><a class="btn" href="#add">Add Student</a></div>
    <div class="card" style="margin-bottom:16px;">
      <input class="input" placeholder="Search students by name or ID...">
    </div>
    <table>
      <thead><tr><th>ID</th><th>Name</th><th>Class</th><th>Parent</th><th>Status</th></tr></thead>
      <tbody>
        <tr><td>S-1021</td><td>Amara Johnson</td><td>7A</td><td>Mrs. Johnson</td><td><span class="badge ok">Active</span></td></tr>
        <tr><td>S-1022</td><td>David Mensah</td><td>9B</td><td>Mr. Mensah</td><td><span class="badge warn">Fees Due</span></td></tr>
      </tbody>
    </table>
    <div class="card" id="add" style="margin-top:16px;">
      <h3 style="margin-bottom:12px;">Add New Student</h3>
      <form class="form">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
          <div><label>Full Name</label><input class="input"></div>
          <div><label>Class</label><select class="input"><option>7A</option><option>9B</option></select></div>
          <div><label>Parent Name</label><input class="input"></div>
          <div><label>Contact</label><input class="input"></div>
        </div>
        <button class="btn" type="button">Save Student</button>
      </form>
    </div>
  </main>
</div>
<script src="stylesheet/assets/sidebar.js"></script>
<script src="stylesheet/assets/app.js"></script>
</body>
</html>
